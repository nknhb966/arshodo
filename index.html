<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR書道（InstancedMesh 色対応）</title>
<style>
body{margin:0;overflow:hidden;}
</style>
</head>

<body>
<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene, camera, renderer;
let controller0, controller1, rightController = null;
let gamepad = null;
let drawing = false;

const STEP_DISTANCE = 0.004;
const MIN_SIZE = 0.001;
const MAX_SIZE = 0.035;
const MAX_STAMPS = 7000;

let instancedMesh;
let stampIndex = 0;

const dummy = new THREE.Object3D();
const pos = new THREE.Vector3();
const lastPos = new THREE.Vector3();
const interp = new THREE.Vector3();

let hasLast = false;
let lastSize = 0.01;
let fadeOutCount = 0;
const FADE_STEPS = 8;

const colorArray = new Float32Array(MAX_STAMPS*3);

let tipMesh = null;

init();
animate();

function init(){
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
    renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(ARButton.createButton(renderer, {requiredFeatures:["local-floor"]}));
    
    scene.add(new THREE.HemisphereLight(0xffffff,0xbbbbff,1));

    controller0 = renderer.xr.getController(0);
    controller1 = renderer.xr.getController(1);
    scene.add(controller0);
    scene.add(controller1);
    controller0.addEventListener("connected", onConnected);
    controller1.addEventListener("connected", onConnected);

    createInkSystem();
    window.addEventListener("resize", resize);
}

function onConnected(e){
    if(e.data.handedness === "right"){
        rightController = e.target;
        attachBrush();
    }
}

function attachBrush(){
    controller0.clear();
    controller1.clear();

    const brush = new THREE.Group();

    const stick = new THREE.Mesh(
        new THREE.CylinderGeometry(0.01,0.01,0.25,6),
        new THREE.MeshStandardMaterial({color:0x884400})
    );

    tipMesh = new THREE.Mesh(
        new THREE.ConeGeometry(0.015,0.05,6),
        new THREE.MeshStandardMaterial({color:0x111111})
    );

    stick.rotation.x = Math.PI/2;
    tipMesh.rotation.x = -Math.PI/2;
    stick.position.z = 0.15;

    brush.add(stick);
    brush.add(tipMesh);
    brush.rotation.set(-Math.PI/3,0,Math.PI/2);

    rightController.add(brush);
}

function createInkSystem(){
    const geo = new THREE.SphereGeometry(1,6,6);

    // カスタムシェーダー対応マテリアル
    const mat = new THREE.MeshBasicMaterial();
    mat.onBeforeCompile = shader => {

        shader.vertexShader = `
            attribute vec3 instanceColor;
            varying vec3 vInstanceColor;
        ` + shader.vertexShader;

        shader.vertexShader = shader.vertexShader.replace(
            `#include <begin_vertex>`,
            `
            #include <begin_vertex>
            vInstanceColor = instanceColor;
            `
        );

        shader.fragmentShader = `
            varying vec3 vInstanceColor;
        ` + shader.fragmentShader;

        shader.fragmentShader = shader.fragmentShader.replace(
            `vec4 diffuseColor = vec4( diffuse, opacity );`,
            `vec4 diffuseColor = vec4(vInstanceColor, opacity );`
        );

        shader.attributes.instanceColor = instancedMesh.instanceColor;
    };

    instancedMesh = new THREE.InstancedMesh(geo, mat, MAX_STAMPS);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    instancedMesh.frustumCulled = false;
    instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(colorArray, 3);
    instancedMesh.count = 0;
    scene.add(instancedMesh);
}

// 毎フレーム右手gamepad取得
function updateGamepad(){
    const session = renderer.xr.getSession();
    if(!session) return;
    for(const source of session.inputSources){
        if(source.handedness === "right" && source.gamepad){
            gamepad = source.gamepad;
            return;
        }
    }
}

function getTrigger(){ return gamepad ? gamepad.buttons[0]?.value||0 : 0; }

function draw(){
    pos.setFromMatrixPosition(rightController.matrixWorld);
    if(hasLast){
        const dist = pos.distanceTo(lastPos);
        const steps = Math.max(2, Math.floor(dist/STEP_DISTANCE));
        for(let i=1;i<=steps;i++){
            const t = i/steps;
            interp.lerpVectors(lastPos, pos, t);

            const pressure = getTrigger();
            const speed = dist;
            const speedFactor = THREE.MathUtils.clamp(1.0 - speed*20.0, 0.2, 1.0);

            let targetSize = MAX_SIZE * pressure * speedFactor;
            targetSize = Math.max(targetSize, MIN_SIZE);

            const size = THREE.MathUtils.lerp(lastSize, targetSize, 0.25);
            lastSize = size;

            stamp(interp, size);
        }
    }
    lastPos.copy(pos);
    hasLast = true;
}

function stamp(position, size, color=[0,0,1]){
    const index = stampIndex % MAX_STAMPS;

    dummy.position.copy(position);
    dummy.scale.set(size, size*0.6, size);
    dummy.updateMatrix();
    instancedMesh.setMatrixAt(index, dummy.matrix);

    // 色を設定（0〜1）
    colorArray[index*3+0] = color[0];
    colorArray[index*3+1] = color[1];
    colorArray[index*3+2] = color[2];

    stampIndex++;
    instancedMesh.count = Math.min(stampIndex, MAX_STAMPS);
    instancedMesh.instanceMatrix.needsUpdate = true;
    instancedMesh.instanceColor.needsUpdate = true;
}

function fadeOut(){
    if(fadeOutCount <= 0) return;
    const size = lastSize*(fadeOutCount/FADE_STEPS);
    stamp(pos, size);
    fadeOutCount--;
}

function clearAll(){
    stampIndex = 0;
    instancedMesh.count = 0;
    hasLast = false;
}

function checkButtons(){
    if(!gamepad) return;
    if(gamepad.buttons[4]?.pressed) clearAll();
}

function animate(){ renderer.setAnimationLoop(render); }

function render(){
    updateGamepad();

    if(!rightController){ renderer.render(scene,camera); return; }

    const t = getTrigger();
    if(t>0.05){
        if(!drawing){ hasLast=false; drawing=true; }
        draw();
        fadeOutCount = FADE_STEPS;
    } else {
        if(drawing){ drawing=false; fadeOut(); }
        else{ fadeOut(); }
    }

    checkButtons();
    renderer.render(scene,camera);
}

function resize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

</script>
</body>
</html>
