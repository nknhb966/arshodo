<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR書道（ストローク分離版）</title>
<style>body{margin:0;overflow:hidden;}</style>
</head>
<body>
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene, camera, renderer;
let controller0, controller1, rightController=null;
let gamepad=null;

const STEP_DISTANCE = 0.005;
const MAX_STAMPS = 8000;

let instancedMesh;
let stampIndex=0;

const dummy = new THREE.Object3D();
const pos = new THREE.Vector3();
const lastPos = new THREE.Vector3();
const interp = new THREE.Vector3();
let hasLast=false;

let drawing=false;

let textGroup = new THREE.Group();

init();
animate();

function init(){
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
    renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled=true;

    document.body.appendChild(renderer.domElement);
    document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:["local-floor"]}));

    scene.add(new THREE.HemisphereLight(0xffffff,0xbbbbff,1));

    controller0 = renderer.xr.getController(0);
    controller1 = renderer.xr.getController(1);
    scene.add(controller0);
    scene.add(controller1);

    controller0.addEventListener("connected", onConnected);
    controller1.addEventListener("connected", onConnected);

    createInkSystem();
    scene.add(textGroup);
}

function onConnected(e){
    if(e.data.handedness==="right"){
        rightController = e.target;
    }
}

function createInkSystem(){
    const geo=new THREE.SphereGeometry(1,10,10);
    const mat=new THREE.MeshStandardMaterial({color:0x111111});
    instancedMesh=new THREE.InstancedMesh(geo,mat,MAX_STAMPS);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    instancedMesh.frustumCulled=false;
    textGroup.add(instancedMesh);
}

function updateGamepad(){
    const session=renderer.xr.getSession();
    if(!session) return;
    for(const s of session.inputSources){
        if(s.handedness==="right" && s.gamepad){
            gamepad=s.gamepad;
        }
    }
}

function getTriggerValue(i){ return gamepad?.buttons[i]?.value||0; }

function draw(){
    const trigger=getTriggerValue(0);
    if(trigger<0.05){
        drawing=false;
        return;
    }

    // ★ 新ストローク開始
    if(!drawing){
        drawing=true;

        pos.setFromMatrixPosition(rightController.matrixWorld);
        const localPos = pos.clone();
        textGroup.worldToLocal(localPos);

        lastPos.copy(localPos);
        hasLast = true;

        stamp(localPos); // 最初の点のみ
        return; // ←ここが超重要
    }

    pos.setFromMatrixPosition(rightController.matrixWorld);
    const localPos = pos.clone();
    textGroup.worldToLocal(localPos);

    if(hasLast){
        const dist = localPos.distanceTo(lastPos);
        const steps = Math.max(1, Math.floor(dist/STEP_DISTANCE));

        for(let i=1;i<=steps;i++){
            interp.lerpVectors(lastPos, localPos, i/steps);
            stamp(interp);
        }
    }

    lastPos.copy(localPos);
}

function stamp(position){
    if(stampIndex>=MAX_STAMPS) return;

    dummy.position.copy(position);
    dummy.scale.set(0.01,0.01,0.01);
    dummy.updateMatrix();

    instancedMesh.setMatrixAt(stampIndex,dummy.matrix);
    stampIndex++;
    instancedMesh.count=stampIndex;
    instancedMesh.instanceMatrix.needsUpdate=true;
}

// 移動・回転
let prev=new THREE.Vector3();
let active=false;

function transform(){
    const v=getTriggerValue(1);
    if(v<0.05){active=false;return;}

    const now=new THREE.Vector3().setFromMatrixPosition(rightController.matrixWorld);

    if(!active){
        prev.copy(now);
        active=true;
        return;
    }

    const d=now.clone().sub(prev);

    if(v<0.9){
        textGroup.position.add(d);
    }else{
        textGroup.rotation.y += d.x*2;
        textGroup.rotation.x += d.y*2;
    }

    prev.copy(now);
}

function animate(){renderer.setAnimationLoop(render);}

function render(){
    updateGamepad();
    if(!rightController){renderer.render(scene,camera);return;}

    if(getTriggerValue(0)>0.05){
        draw();
    }else{
        transform();
    }

    renderer.render(scene,camera);
}
</script>
</body>
</html>
