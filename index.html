```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR書道（Quest3 / WebXR）</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
#ui {
  position: fixed; left: 10px; top: 10px; color: #fff; font-family: sans-serif;
  background: rgba(0,0,0,0.4); padding: 8px 10px; border-radius: 6px; font-size: 12px;
}
</style>
</head>
<body>
<div id="ui">
トリガー：書く / 離す：止める<br>
Aボタン：全消し
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/ARButton.js";
import { FontLoader } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/FontLoader.js";
import { TextGeometry } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/geometries/TextGeometry.js";

let scene, camera, renderer;
let controller;

let drawing = false;
let prevPoint = null;
let brushWidth = 0.02;

let stampTexture;
let stampMaterial;

const stamps = [];
const clock = new THREE.Clock();

// パラメータ
const MIN_WIDTH = 0.01;
const MAX_WIDTH = 0.06;
const WIDTH_SMOOTH = 0.25;
const STAMP_SPACING = 0.01;

init();
animate();

function init(){

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);

  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  document.body.appendChild(
    ARButton.createButton(renderer,{ requiredFeatures:["local-floor"] })
  );

  const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
  scene.add(light);

  createPaper();
  createBrush();

  // 墨テクスチャ
  stampTexture = new THREE.TextureLoader().load("ink.png");
  stampMaterial = new THREE.MeshBasicMaterial({
    map: stampTexture,
    transparent: true,
    depthWrite: false
  });

  // コントローラー
  controller = renderer.xr.getController(0);
  controller.addEventListener("selectstart", startDraw);
  controller.addEventListener("selectend", endDraw);
  controller.addEventListener("connected", e=>{
    controller.gamepad = e.data.gamepad;
  });
  scene.add(controller);

  createText("山");

  window.addEventListener("resize", onResize);

}

function createPaper(){

  const geo = new THREE.PlaneGeometry(1.4,0.9);

  const mat = new THREE.MeshBasicMaterial({
    color:0xffffff,
    transparent:true,
    opacity:0.5,
    side:THREE.DoubleSide
  });

  const paper = new THREE.Mesh(geo,mat);
  paper.position.set(0,1.4,-1.2);

  scene.add(paper);

}

function createBrush(){

  const stick = new THREE.Mesh(
    new THREE.CylinderGeometry(0.006,0.006,0.25),
    new THREE.MeshStandardMaterial({color:0x885522})
  );
  stick.position.y = -0.12;

  const tip = new THREE.Mesh(
    new THREE.ConeGeometry(0.015,0.05),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  tip.position.y = -0.28;

  const brush = new THREE.Group();
  brush.add(stick);
  brush.add(tip);

  controller = renderer.xr.getController(0);
  controller.add(brush);

}

function createText(str){

  const loader = new FontLoader();

  loader.load(
    "https://cdn.jsdelivr.net/npm/three@0.160/examples/fonts/helvetiker_regular.typeface.json",
    font=>{
      const geo = new TextGeometry(str,{
        font:font,
        size:0.25,
        height:0.01
      });

      const mat = new THREE.MeshBasicMaterial({
        color:0x777777,
        transparent:true,
        opacity:0.3
      });

      const mesh = new THREE.Mesh(geo,mat);
      mesh.position.set(-0.15,1.45,-1.19);

      scene.add(mesh);
    }
  );

}

function startDraw(){
  drawing = true;
  prevPoint = getTipPosition();
}

function endDraw(){
  drawing = false;
  // はらい
  for(let i=0;i<5;i++){
    brushWidth *= 0.7;
    addStamp(prevPoint, brushWidth);
  }
}

function getTipPosition(){
  const pos = new THREE.Vector3();
  pos.setFromMatrixPosition(controller.matrixWorld);
  return pos;
}

function updateBrush(){

  const point = getTipPosition();

  if(!prevPoint){
    prevPoint = point;
    return;
  }

  const dist = point.distanceTo(prevPoint);
  const speed = dist / clock.getDelta();

  const targetWidth = THREE.MathUtils.clamp(
    0.05/(speed+0.1),
    MIN_WIDTH,
    MAX_WIDTH
  );

  brushWidth = THREE.MathUtils.lerp(brushWidth,targetWidth,WIDTH_SMOOTH);

  if(dist > STAMP_SPACING){

    const steps = Math.floor(dist / STAMP_SPACING);

    for(let i=0;i<steps;i++){

      const p = prevPoint.clone().lerp(point, i/steps);
      addStamp(p, brushWidth);

    }

    prevPoint = point;

  }

}

function addStamp(pos, size){

  const geo = new THREE.PlaneGeometry(size,size);

  const mesh = new THREE.Mesh(geo, stampMaterial);

  mesh.position.copy(pos);
  mesh.lookAt(camera.position);

  scene.add(mesh);
  stamps.push(mesh);

}

function clearAll(){

  for(const s of stamps){
    scene.remove(s);
  }
  stamps.length = 0;

}

function animate(){
  renderer.setAnimationLoop(render);
}

function render(){

  if(drawing){
    updateBrush();
  }

  // Aボタン
  if(controller.gamepad){
    if(controller.gamepad.buttons[4] && controller.gamepad.buttons[4].pressed){
      clearAll();
    }
  }

  renderer.render(scene,camera);

}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

</script>
</body>
</html>
