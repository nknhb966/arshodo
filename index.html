<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR空中書道（Quest最適化）</title>

<style>
body{
margin:0;
overflow:hidden;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer,controller;

let drawing=false;

const STEP_DISTANCE=0.006;

const MIN_SIZE=0.01;
const MAX_SIZE=0.035;

const MAX_STAMPS=15000;

let instancedMesh;
let stampIndex=0;

let inkUpdated=false;

const dummy=new THREE.Object3D();
const pos=new THREE.Vector3();
const lastPos=new THREE.Vector3();
const interp=new THREE.Vector3();

let hasLast=false;

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

if(navigator.xr){

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["local-floor"]
})
);

}

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

controller=renderer.xr.getController(0);

controller.addEventListener("selectstart",startDraw);
controller.addEventListener("selectend",endDraw);

scene.add(controller);

createBrush();
createInkSystem();

window.addEventListener("resize",resize);

}

function createBrush(){

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.005,0.005,0.25,6),
new THREE.MeshStandardMaterial({color:0x884400})
);

stick.position.y=-0.12;

const tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05,6),
new THREE.MeshStandardMaterial({color:0x111111})
);

tip.position.y=-0.28;

const brush=new THREE.Group();
brush.add(stick);
brush.add(tip);

controller.add(brush);

}

function createInkSystem(){

const geo=new THREE.SphereGeometry(1,4,4);

const mat=new THREE.MeshStandardMaterial({
color:0x111111,
roughness:1
});

instancedMesh=new THREE.InstancedMesh(
geo,
mat,
MAX_STAMPS
);

scene.add(instancedMesh);

}

function startDraw(){

drawing=true;
hasLast=false;

}

function endDraw(){

drawing=false;
hasLast=false;

}

function draw(){

pos.setFromMatrixPosition(controller.matrixWorld);

if(hasLast){

const dist=pos.distanceTo(lastPos);

const steps=Math.floor(dist/STEP_DISTANCE);

for(let i=1;i<=steps;i++){

const t=i/steps;

interp.lerpVectors(lastPos,pos,t);

let size=THREE.MathUtils.clamp(
MAX_SIZE-dist*2,
MIN_SIZE,
MAX_SIZE
);

stamp(interp,size);

}

}

lastPos.copy(pos);
hasLast=true;

}

function stamp(position,size){

if(stampIndex>=MAX_STAMPS) return;

dummy.position.copy(position);
dummy.scale.set(size,size,size);

dummy.updateMatrix();

instancedMesh.setMatrixAt(stampIndex,dummy.matrix);

stampIndex++;

inkUpdated=true;

}

function clearAll(){

stampIndex=0;
instancedMesh.count=0;

}

function checkClear(){

const session=renderer.xr.getSession();
if(!session) return;

for(const source of session.inputSources){

if(!source.gamepad) continue;

const buttons=source.gamepad.buttons;

if(buttons.length>4){

if(buttons[4].pressed){

clearAll();

}

}

}

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

if(drawing){
draw();
}

if(inkUpdated){

instancedMesh.count=stampIndex;
instancedMesh.instanceMatrix.needsUpdate=true;

inkUpdated=false;

}

checkClear();

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
