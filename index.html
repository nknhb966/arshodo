<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR書道</title>

<style>
body{
margin:0;
overflow:hidden;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer;

// ★ 2本持ち
let controller0,controller1;
let activeController=null;

let drawing=false;

const STEP_DISTANCE=0.005;
const MIN_SIZE=0.001;
const MAX_SIZE=0.030;
const MAX_STAMPS=8000;

let instancedMesh;
let stampIndex=0;

let inkUpdated=false;

let gamepad=null;

const dummy=new THREE.Object3D();
const pos=new THREE.Vector3();
const lastPos=new THREE.Vector3();
const interp=new THREE.Vector3();

let hasLast=false;

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

if(navigator.xr){
document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["local-floor"]
})
);
}

renderer.xr.addEventListener("sessionstart",onSessionStart);

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

// ★ controller2本
controller0 = renderer.xr.getController(0);
controller1 = renderer.xr.getController(1);

scene.add(controller0);
scene.add(controller1);

// ★ 両方に筆を付ける（あとで片方消す）
createBrush(controller0);
createBrush(controller1);

createInkSystem();

window.addEventListener("resize",resize);

}

function onSessionStart(){

const session = renderer.xr.getSession();
session.addEventListener("inputsourceschange",updateInputSource);
updateInputSource();

}

function updateInputSource(){

const session = renderer.xr.getSession();
if(!session) return;

activeController=null;
gamepad=null;

// 一旦両方表示
controller0.visible = true;
controller1.visible = true;

for(const source of session.inputSources){

if(source.handedness === "right"){

const index = session.inputSources.indexOf(source);

if(index===0) activeController = controller0;
if(index===1) activeController = controller1;

gamepad = source.gamepad || null;

}

}

// ★ 右以外を無効化
if(activeController === controller0){
controller1.visible = false;
}
if(activeController === controller1){
controller0.visible = false;
}

}

function createBrush(target){

const brush=new THREE.Group();

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.012,0.012,0.25,6),
new THREE.MeshStandardMaterial({color:0x884400})
);

const tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05,6),
new THREE.MeshStandardMaterial({color:0x111111})
);

stick.rotation.x=Math.PI/2;
tip.rotation.x=-Math.PI/2;

tip.position.z=0;
stick.position.z=0.15;

brush.rotation.z=Math.PI/2;
brush.rotation.x=-Math.PI/3;

brush.add(stick);
brush.add(tip);

target.add(brush);

}

function createInkSystem(){

const geo=new THREE.SphereGeometry(1,10,10);

const mat=new THREE.MeshStandardMaterial({
color:0x111111,
roughness:1
});

instancedMesh=new THREE.InstancedMesh(
geo,
mat,
MAX_STAMPS
);

instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
instancedMesh.frustumCulled=false;

scene.add(instancedMesh);

dummy.position.set(0,0,-1000);
dummy.scale.set(0,0,0);
dummy.updateMatrix();

instancedMesh.setMatrixAt(0,dummy.matrix);
instancedMesh.count=1;
instancedMesh.instanceMatrix.needsUpdate=true;

}

function getTriggerValue(){

if(!gamepad) return 0;

if(gamepad.buttons.length>0){
return gamepad.buttons[0].value;
}

return 0;

}

function draw(){

if(!activeController) return;

pos.setFromMatrixPosition(activeController.matrixWorld);

if(hasLast){

const dist=pos.distanceTo(lastPos);
const steps=Math.max(1,Math.floor(dist/STEP_DISTANCE));

for(let i=1;i<=steps;i++){

const t=i/steps;
interp.lerpVectors(lastPos,pos,t);

const trigger=getTriggerValue();

let pressureSize=THREE.MathUtils.lerp(
MIN_SIZE,
MAX_SIZE,
trigger
);

let speedSize=THREE.MathUtils.clamp(
MAX_SIZE-dist*2,
MIN_SIZE,
MAX_SIZE
);

let size=(pressureSize+speedSize)*0.5;

stamp(interp,size);

}

}

lastPos.copy(pos);
hasLast=true;

}

function stamp(position,size){

if(stampIndex>=MAX_STAMPS) return;

dummy.position.copy(position);
dummy.scale.set(size,size,size);

dummy.updateMatrix();

instancedMesh.setMatrixAt(stampIndex,dummy.matrix);

stampIndex++;
inkUpdated=true;

}

function clearAll(){

stampIndex=0;
instancedMesh.count=0;
instancedMesh.instanceMatrix.needsUpdate=true;
hasLast=false;

}

function checkClear(){

if(!gamepad) return;

if(gamepad.buttons.length>4){
if(gamepad.buttons[4].pressed){
clearAll();
}
}

}

function animate(){
renderer.setAnimationLoop(render);
}

function render(){

if(!activeController){
renderer.render(scene,camera);
return;
}

const trigger=getTriggerValue();

if(trigger>0.05){

if(!drawing){
hasLast=false;
drawing=true;
}

draw();

}else{
drawing=false;
}

if(inkUpdated){
instancedMesh.count=stampIndex;
instancedMesh.instanceMatrix.needsUpdate=true;
inkUpdated=false;
}

checkClear();

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
