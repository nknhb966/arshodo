<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>VR 球体生成テスト</title>
<style>
body{margin:0;overflow:hidden;}
canvas{display:block;}
</style>
</head>
<body>
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene, camera, renderer;
let controller0, controller1, rightController = null;
let gamepad = null;

let brushColor = new THREE.Color(0xff0000);
const spheres = []; // 生成した球体を保持

// 初期球体
let initialSphere;

init();
animate();

function init(){
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 10);
    camera.position.z = 1;

    renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures:["local-floor"] }));

    const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
    scene.add(light);

    // 初期球体
    const geo = new THREE.SphereGeometry(0.1, 32, 32);
    const mat = new THREE.MeshStandardMaterial({ color: brushColor });
    initialSphere = new THREE.Mesh(geo, mat);
    initialSphere.position.set(0,0,-0.5);
    scene.add(initialSphere);
    spheres.push(initialSphere);

    // コントローラー
    controller0 = renderer.xr.getController(0);
    controller1 = renderer.xr.getController(1);
    scene.add(controller0, controller1);
    controller0.addEventListener("connected", onConnected);
    controller1.addEventListener("connected", onConnected);

    window.addEventListener("resize", resize);
}

function onConnected(e){
    if(e.data.handedness === "right"){
        rightController = e.target;
        console.log("Right controller connected");
    }
}

function updateGamepad(){
    const session = renderer.xr.getSession();
    if(!session) return;

    gamepad = null;
    for(const source of session.inputSources){
        if(source.handedness==="right" && source.gamepad){
            gamepad = source.gamepad;
            break;
        }
    }
}

function getTrigger(){
    if(!gamepad) return 0;
    return gamepad.buttons[0]?.value || 0;
}

function updateColor(){
    if(!gamepad) return;

    let x=0, y=0;
    if(gamepad.axes.length>=4){
        x = gamepad.axes[2];
        y = gamepad.axes[3];
    } else if(gamepad.axes.length>=2){
        x = gamepad.axes[0];
        y = gamepad.axes[1];
    }

    const len = Math.hypot(x,y);
    if(len>0.2){
        let angle = Math.atan2(y,x);
        if(angle < 0) angle += Math.PI*2;
        const hue = angle/(Math.PI*2);
        brushColor.setHSL(hue,1,0.5);

        // 既存の全球体の色を変えない
        // 初期球体の色を更新（オプション）
        initialSphere.material.color.copy(brushColor);
    }
}

function spawnSphere(){
    if(!rightController) return;
    const pos = new THREE.Vector3();
    pos.setFromMatrixPosition(rightController.matrixWorld);

    const geo = new THREE.SphereGeometry(0.05, 32, 32);
    const mat = new THREE.MeshStandardMaterial({ color: brushColor.clone() });
    const sphere = new THREE.Mesh(geo, mat);
    sphere.position.copy(pos);
    scene.add(sphere);
    spheres.push(sphere);
}

let triggerPressed = false;

function animate(){
    renderer.setAnimationLoop(render);
}

function render(){
    updateGamepad();
    updateColor();

    const t = getTrigger();
    if(t>0.05){
        if(!triggerPressed){
            spawnSphere();
            triggerPressed = true;
        }
    } else {
        triggerPressed = false;
    }

    renderer.render(scene, camera);
}

function resize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

</script>
</body>
</html>
