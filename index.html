<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>XR空中書道 Quest軽量版</title>

<style>
body{
margin:0;
overflow:hidden;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { VRButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/VRButton.js";

let scene,camera,renderer,controller;

let drawing=false;

const STEP_DISTANCE=0.006;

const MIN_SIZE=0.003;
const MAX_SIZE=0.03;

const MAX_STAMPS=7000;

let instancedMesh;
let stampIndex=0;

let inkDirty=false;

const dummy=new THREE.Object3D();

const pos=new THREE.Vector3();
const lastPos=new THREE.Vector3();
const interp=new THREE.Vector3();

let tip;
const tipWorld=new THREE.Vector3();

let hasLast=false;

init();
animate();

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0xffffff);

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
50
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:false
});

renderer.xr.enabled=true;

renderer.setPixelRatio(1);

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

document.body.appendChild(VRButton.createButton(renderer));

const light=new THREE.HemisphereLight(0xffffff,0xcccccc,1);
scene.add(light);

controller=renderer.xr.getController(0);
scene.add(controller);

createBrush();
createInk();

window.addEventListener("resize",resize);

}

function createBrush(){

const brush=new THREE.Group();

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.01,0.01,0.25,6),
new THREE.MeshStandardMaterial({color:0x884400})
);

tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05,6),
new THREE.MeshStandardMaterial({color:0x111111})
);

stick.rotation.x=Math.PI/2;
tip.rotation.x=-Math.PI/2;

stick.position.z=0.15;

brush.add(stick);
brush.add(tip);

brush.rotation.z=Math.PI/2;
brush.rotation.x=-Math.PI/3;

controller.add(brush);

}

function createInk(){

const geo=new THREE.SphereGeometry(1,4,2);

const mat=new THREE.MeshStandardMaterial({
color:0x111111,
roughness:1,
transparent:false
});

instancedMesh=new THREE.InstancedMesh(
geo,
mat,
MAX_STAMPS
);

scene.add(instancedMesh);

}

function getTrigger(){

const session=renderer.xr.getSession();
if(!session) return 0;

for(const source of session.inputSources){

if(source.gamepad){

const gp=source.gamepad;

if(gp.buttons.length>0){

if(gp.buttons[0].pressed) return 1;

}

}

}

return 0;

}

function getTipPosition(){

tip.getWorldPosition(tipWorld);
return tipWorld;

}

function draw(){

pos.copy(getTipPosition());

if(hasLast){

const dist=pos.distanceTo(lastPos);

const steps=Math.max(1,Math.floor(dist/STEP_DISTANCE));

for(let i=1;i<=steps;i++){

const t=i/steps;

interp.lerpVectors(lastPos,pos,t);

const trigger=getTrigger();

let pressureSize=THREE.MathUtils.lerp(
MIN_SIZE,
MAX_SIZE,
trigger
);

let speedSize=THREE.MathUtils.clamp(
MAX_SIZE-dist*2,
MIN_SIZE,
MAX_SIZE
);

let size=(pressureSize+speedSize)*0.5;

stamp(interp,size);

}

}

lastPos.copy(pos);
hasLast=true;

}

function stamp(position,size){

dummy.position.copy(position);
dummy.scale.set(size,size,size);

dummy.updateMatrix();

instancedMesh.setMatrixAt(stampIndex,dummy.matrix);

stampIndex++;

if(stampIndex>=MAX_STAMPS){

stampIndex=0;

}

inkDirty=true;

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

controller.updateMatrixWorld(true);

const trigger=getTrigger();

if(trigger>0){

if(!drawing){

drawing=true;
hasLast=false;

}

draw();

}else{

drawing=false;

}

if(inkDirty){

instancedMesh.count=Math.min(stampIndex,MAX_STAMPS);

instancedMesh.instanceMatrix.needsUpdate=true;

inkDirty=false;

}

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}

</script>

</body>
</html>
