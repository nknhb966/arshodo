<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>XR空中書道 Stroke版</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer,controller;

let brushTip;

let drawing=false;

const STEP_DISTANCE=0.01;

const MIN_SIZE=0.002;
const MAX_SIZE=0.05;

let points=[];
let sizes=[];

let strokeMesh;

let gamepad=null;

const pos=new THREE.Vector3();
const lastPos=new THREE.Vector3();

let hasLast=false;

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setPixelRatio(window.devicePixelRatio);

renderer.setSize(window.innerWidth,window.innerHeight);

renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

if(navigator.xr){

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["local-floor"]
})
);

}

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

controller=renderer.xr.getController(0);
scene.add(controller);

createBrush();

window.addEventListener("resize",resize);

}

function createBrush(){

const brush=new THREE.Group();

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.012,0.012,0.25,6),
new THREE.MeshStandardMaterial({color:0x884400})
);

const tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05,6),
new THREE.MeshStandardMaterial({color:0x111111})
);

stick.rotation.x=Math.PI/2;
tip.rotation.x=-Math.PI/2;

tip.position.z=0;
stick.position.z=0.15;

brush.rotation.z=Math.PI/2;
brush.rotation.x=-Math.PI/3;

brush.add(stick);
brush.add(tip);

controller.add(brush);

brushTip=tip;

}

function cacheGamepad(){

if(gamepad) return;

const session=renderer.xr.getSession();
if(!session) return;

for(const source of session.inputSources){

if(source.gamepad){

gamepad=source.gamepad;
break;

}

}

}

function getTriggerValue(){

if(!gamepad) return 0;

if(gamepad.buttons.length>0){

return gamepad.buttons[0].value;

}

return 0;

}

function draw(){

brushTip.getWorldPosition(pos);

if(hasLast){

const dist=pos.distanceTo(lastPos);

if(dist>STEP_DISTANCE){

const trigger=getTriggerValue();

let size=THREE.MathUtils.lerp(
MIN_SIZE,
MAX_SIZE,
trigger
);

size*=THREE.MathUtils.randFloat(0.9,1.1);

points.push(pos.clone());
sizes.push(size);

updateStroke();

lastPos.copy(pos);

}

}else{

lastPos.copy(pos);
hasLast=true;

}

}

function updateStroke(){

if(points.length<2) return;

const vertices=[];
const indices=[];

for(let i=0;i<points.length;i++){

const p=points[i];

const size=sizes[i];

const dir=new THREE.Vector3();

if(i<points.length-1){

dir.subVectors(points[i+1],p);

}else{

dir.subVectors(p,points[i-1]);

}

const normal=new THREE.Vector3();

normal.crossVectors(dir,camera.position.clone().sub(p));

normal.normalize();

normal.multiplyScalar(size);

const left=p.clone().add(normal);
const right=p.clone().sub(normal);

vertices.push(left.x,left.y,left.z);
vertices.push(right.x,right.y,right.z);

}

for(let i=0;i<points.length-1;i++){

const a=i*2;
const b=i*2+1;
const c=i*2+2;
const d=i*2+3;

indices.push(a,b,c);
indices.push(b,d,c);

}

const geo=new THREE.BufferGeometry();

geo.setAttribute(
"position",
new THREE.Float32BufferAttribute(vertices,3)
);

geo.setIndex(indices);

geo.computeVertexNormals();

if(strokeMesh){

scene.remove(strokeMesh);

}

strokeMesh=new THREE.Mesh(
geo,
new THREE.MeshBasicMaterial({
color:0x111111,
side:THREE.DoubleSide
})
);

scene.add(strokeMesh);

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

cacheGamepad();

const trigger=getTriggerValue();

if(trigger>0.05){

drawing=true;

draw();

}else{

drawing=false;

hasLast=false;

}

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
