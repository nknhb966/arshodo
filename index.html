<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>InstancedMesh 色追従</title>
<style>
body{margin:0;overflow:hidden;}
canvas{display:block;}
</style>
</head>
<body>
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene, camera, renderer;
let controller0, controller1, rightController=null;
let gamepad=null;

const MAX_SPHERES = 1000;
let instancedMesh;
let colorArray;
let dummy = new THREE.Object3D();
let spawnIndex = 0;

let brushColor = new THREE.Color(0xff0000);

init();
animate();

function init(){
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 10);
    camera.position.z = 1;

    renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures:["local-floor"] }));

    const light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
    scene.add(light);

    // InstancedMesh 作成
    const geo = new THREE.SphereGeometry(0.05, 16,16);
    const mat = new THREE.MeshStandardMaterial({vertexColors:true});
    instancedMesh = new THREE.InstancedMesh(geo, mat, MAX_SPHERES);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

    colorArray = new Float32Array(MAX_SPHERES*3);
    instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(colorArray,3);

    scene.add(instancedMesh);

    // コントローラー
    controller0 = renderer.xr.getController(0);
    controller1 = renderer.xr.getController(1);
    scene.add(controller0, controller1);
    controller0.addEventListener("connected", onConnected);
    controller1.addEventListener("connected", onConnected);

    window.addEventListener("resize", resize);
}

function onConnected(e){
    if(e.data.handedness==="right"){
        rightController = e.target;
        console.log("Right controller connected");
    }
}

function updateGamepad(){
    const session = renderer.xr.getSession();
    if(!session) return;
    gamepad = null;
    for(const source of session.inputSources){
        if(source.handedness==="right" && source.gamepad){
            gamepad = source.gamepad;
            break;
        }
    }
}

function getTrigger(){
    if(!gamepad) return 0;
    return gamepad.buttons[0]?.value || 0;
}

// スティックで色変更
function updateColor(){
    if(!gamepad) return;

    let x=0, y=0;
    if(gamepad.axes.length>=4){
        x=gamepad.axes[2]; y=gamepad.axes[3];
    } else if(gamepad.axes.length>=2){
        x=gamepad.axes[0]; y=gamepad.axes[1];
    }

    const len = Math.hypot(x,y);
    if(len>0.2){
        let angle = Math.atan2(y,x);
        if(angle<0) angle += Math.PI*2;
        const hue = angle/(Math.PI*2);
        brushColor.setHSL(hue,1,0.5);
    }

    // 既存のインスタンスも追従させる
    for(let i=0;i<Math.min(spawnIndex, MAX_SPHERES); i++){
        colorArray[i*3+0] = brushColor.r;
        colorArray[i*3+1] = brushColor.g;
        colorArray[i*3+2] = brushColor.b;
    }
    instancedMesh.instanceColor.needsUpdate = true;
}

let triggerPressed=false;

// 新しい球体生成
function spawnSphere(){
    if(!rightController) return;
    const pos = new THREE.Vector3();
    pos.setFromMatrixPosition(rightController.matrixWorld);

    dummy.position.copy(pos);
    dummy.scale.set(0.05,0.05,0.05);
    dummy.updateMatrix();

    const index = spawnIndex % MAX_SPHERES;
    instancedMesh.setMatrixAt(index, dummy.matrix);

    colorArray[index*3+0] = brushColor.r;
    colorArray[index*3+1] = brushColor.g;
    colorArray[index*3+2] = brushColor.b;

    instancedMesh.instanceMatrix.needsUpdate = true;
    instancedMesh.instanceColor.needsUpdate = true;

    spawnIndex++;
}

function animate(){
    renderer.setAnimationLoop(render);
}

function render(){
    updateGamepad();
    updateColor();

    const t = getTrigger();
    if(t>0.05){
        if(!triggerPressed){
            spawnSphere();
            triggerPressed=true;
        }
    } else {
        triggerPressed=false;
    }

    renderer.render(scene,camera);
}

function resize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
