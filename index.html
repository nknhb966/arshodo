<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR空中書道（球スタンプ）</title>

<style>
body{
margin:0;
overflow:hidden;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer;
let controller;

let drawing=false;

let strokes=[];
let lastPos=null;

const MIN_SIZE=0.008;
const MAX_SIZE=0.035;

const STEP_DISTANCE=0.01;

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

if(navigator.xr){
document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["local-floor"]
})
);
}

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

controller=renderer.xr.getController(0);
controller.addEventListener("selectstart",startDraw);
controller.addEventListener("selectend",endDraw);

scene.add(controller);

createBrush();

window.addEventListener("resize",resize);

}

function createBrush(){

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.005,0.005,0.25),
new THREE.MeshStandardMaterial({color:0x884400})
);

stick.position.y=-0.12;

const tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05),
new THREE.MeshStandardMaterial({color:0x111111})
);

tip.position.y=-0.28;

const brush=new THREE.Group();
brush.add(stick);
brush.add(tip);

controller.add(brush);

}

function startDraw(){

drawing=true;
lastPos=null;

}

function endDraw(){

drawing=false;
lastPos=null;

}

function draw(){

const pos=new THREE.Vector3();
pos.setFromMatrixPosition(controller.matrixWorld);

if(lastPos){

const dist=pos.distanceTo(lastPos);

const steps=Math.floor(dist / STEP_DISTANCE);

if(steps > 0){

for(let i=1;i<=steps;i++){

const t=i/steps;

const interp=new THREE.Vector3().lerpVectors(
lastPos,
pos,
t
);

const speed=dist;

let size=THREE.MathUtils.clamp(
MAX_SIZE-speed*2,
MIN_SIZE,
MAX_SIZE
);

stamp(interp,size);

}

}

}

lastPos=pos;

}

function stamp(position,size){

const geo=new THREE.SphereGeometry(size,8,8);

const mat=new THREE.MeshStandardMaterial({
color:0x111111,
roughness:1
});

const mesh=new THREE.Mesh(geo,mat);

mesh.position.copy(position);

scene.add(mesh);

strokes.push(mesh);

}

function clearAll(){

for(const s of strokes){
scene.remove(s);
}

strokes=[];

}

function checkClear(){

const session=renderer.xr.getSession();
if(!session) return;

for(const source of session.inputSources){

if(!source.gamepad) continue;

const buttons=source.gamepad.buttons;

if(buttons.length>4){

const aButton=buttons[4];

if(aButton.pressed){

clearAll();

}

}

}

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

if(drawing){
draw();
}

checkClear();

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
