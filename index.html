<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR空中書道</title>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer;
let controller;

let drawing=false;

let points=[];
let tubeMesh=null;

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

if(navigator.xr){

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["local-floor"]
})
);

}

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

controller=renderer.xr.getController(0);

controller.addEventListener("selectstart",startDraw);
controller.addEventListener("selectend",endDraw);

scene.add(controller);

createBrush();

window.addEventListener("resize",resize);

}

function createBrush(){

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.005,0.005,0.25),
new THREE.MeshStandardMaterial({color:0x884400})
);

stick.position.y=-0.12;

const tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05),
new THREE.MeshStandardMaterial({color:0x111111})
);

tip.position.y=-0.28;

const brush=new THREE.Group();
brush.add(stick);
brush.add(tip);

controller.add(brush);

}

function startDraw(){

drawing=true;
points=[];

}

function endDraw(){

drawing=false;

}

function updateStroke(){

if(points.length<2) return;

const curve=new THREE.CatmullRomCurve3(points);

const geometry=new THREE.TubeGeometry(
curve,
points.length*2,
0.01,
6,
false
);

const material=new THREE.MeshStandardMaterial({
color:0x111111,
roughness:1
});

if(tubeMesh) scene.remove(tubeMesh);

tubeMesh=new THREE.Mesh(geometry,material);

scene.add(tubeMesh);

}

function draw(){

const pos=new THREE.Vector3();
pos.setFromMatrixPosition(controller.matrixWorld);

points.push(pos.clone());

updateStroke();

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

if(drawing){
draw();
}

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
