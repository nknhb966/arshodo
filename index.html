<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR書道 完全分離版</title>
<style>body{margin:0;overflow:hidden;}</style>
</head>
<body>
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene, camera, renderer;
let controller0, controller1, rightController=null;
let gamepad=null;

const STEP_DISTANCE = 0.005;
const MAX_STAMPS = 8000;

let instancedMesh;
let stampIndex=0;

const dummy = new THREE.Object3D();
const pos = new THREE.Vector3();
const lastPos = new THREE.Vector3();
const interp = new THREE.Vector3();

let hasLast=false;
let drawing=false;

// 描画まとめ
let textGroup = new THREE.Group();

init();
animate();

function init(){
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled=true;

    document.body.appendChild(renderer.domElement);
    document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:["local-floor"]}));

    scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

    controller0 = renderer.xr.getController(0);
    controller1 = renderer.xr.getController(1);
    scene.add(controller0, controller1);

    controller0.addEventListener("connected", onConnected);
    controller1.addEventListener("connected", onConnected);

    createInkSystem();
    scene.add(textGroup);

    window.addEventListener("resize", resize);
}

function onConnected(e){
    if(e.data.handedness==="right"){
        rightController = e.target;
        attachBrush();
    }
}

function attachBrush(){
    if(!rightController) return;

    const brush = new THREE.Group();

    const stick = new THREE.Mesh(
        new THREE.CylinderGeometry(0.012,0.012,0.25,6),
        new THREE.MeshStandardMaterial({color:0x884400})
    );

    const tip = new THREE.Mesh(
        new THREE.ConeGeometry(0.015,0.05,6),
        new THREE.MeshStandardMaterial({color:0x111111})
    );

    stick.rotation.x = Math.PI/2;
    tip.rotation.x = -Math.PI/2;
    stick.position.z = 0.15;

    brush.add(stick, tip);
    brush.rotation.set(-Math.PI/3,0,Math.PI/2);

    rightController.add(brush);
}

function createInkSystem(){
    const geo = new THREE.SphereGeometry(1,10,10);
    const mat = new THREE.MeshStandardMaterial({color:0x111111});

    instancedMesh = new THREE.InstancedMesh(geo, mat, MAX_STAMPS);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    instancedMesh.frustumCulled = false;

    textGroup.add(instancedMesh);
    instancedMesh.count = 0;
}

function updateGamepad(){
    const session = renderer.xr.getSession();
    if(!session) return;

    for(const s of session.inputSources){
        if(s.handedness==="right" && s.gamepad){
            gamepad = s.gamepad;
            return;
        }
    }
}

function getTriggerValue(i){
    return gamepad ? gamepad.buttons[i]?.value||0 : 0;
}

// ★ここ重要：lastPosは触らない
function startNewDrawing(){
    hasLast = false;
}

function draw(){
    if(!rightController) return;

    const trigger = getTriggerValue(0);

    if(trigger < 0.05){
        drawing=false;
        return;
    }

    if(!drawing){
        startNewDrawing();
        drawing=true;
    }

    pos.setFromMatrixPosition(rightController.matrixWorld);
    const localPos = pos.clone();
    textGroup.worldToLocal(localPos);

    // ★最初の1点は絶対描かない（完全分離）
    if(!hasLast){
        lastPos.copy(localPos);
        hasLast = true;
        return;
    }

    const dist = localPos.distanceTo(lastPos);

    // ★近すぎる場合は無視
    if(dist < STEP_DISTANCE) return;

    const steps = Math.floor(dist / STEP_DISTANCE);

    for(let i=1;i<=steps;i++){
        interp.lerpVectors(lastPos, localPos, i/steps);
        stamp(interp, 0.01);
    }

    lastPos.copy(localPos);
}

function stamp(p, s){
    if(stampIndex>=MAX_STAMPS) return;

    dummy.position.copy(p);
    dummy.scale.set(s,s,s);
    dummy.updateMatrix();

    instancedMesh.setMatrixAt(stampIndex, dummy.matrix);

    stampIndex++;
    instancedMesh.count = stampIndex;
    instancedMesh.instanceMatrix.needsUpdate = true;
}

// 移動・回転
let rotationActive=false;
let prevPos = new THREE.Vector3();

function handleTransform(){
    const mid = getTriggerValue(1);

    if(mid<0.05){
        rotationActive=false;
        return;
    }

    const current = new THREE.Vector3().setFromMatrixPosition(rightController.matrixWorld);

    if(!rotationActive){
        prevPos.copy(current);
        rotationActive=true;
        return;
    }

    const delta = current.clone().sub(prevPos);

    if(mid<0.9){
        textGroup.position.add(delta);
    }else{
        textGroup.rotation.y += delta.x * 2.0;
        textGroup.rotation.x += delta.y * 2.0;
    }

    prevPos.copy(current);
}

function animate(){
    renderer.setAnimationLoop(render);
}

function render(){
    updateGamepad();

    if(!rightController){
        renderer.render(scene,camera);
        return;
    }

    const trigger = getTriggerValue(0);

    if(trigger>0.05){
        draw();
    }else{
        handleTransform();
    }

    renderer.render(scene,camera);
}

function resize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
