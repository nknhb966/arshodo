<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR空中書道（筆圧版）</title>

<style>
body{
margin:0;
overflow:hidden;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer;
let controller;

let drawing=false;

let strokes=[];

let currentStroke=[];
let lastPos=null;

const MIN_WIDTH=0.005;
const MAX_WIDTH=0.03;

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

if(navigator.xr){
document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["local-floor"]
})
);
}

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

controller=renderer.xr.getController(0);

controller.addEventListener("selectstart",startDraw);
controller.addEventListener("selectend",endDraw);

scene.add(controller);

createBrush();

window.addEventListener("resize",resize);

}

function createBrush(){

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.005,0.005,0.25),
new THREE.MeshStandardMaterial({color:0x884400})
);

stick.position.y=-0.12;

const tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05),
new THREE.MeshStandardMaterial({color:0x111111})
);

tip.position.y=-0.28;

const brush=new THREE.Group();
brush.add(stick);
brush.add(tip);

controller.add(brush);

}

function startDraw(){

drawing=true;

currentStroke=[];
lastPos=null;

}

function endDraw(){

drawing=false;

if(currentStroke.length>0){

const mesh=createStrokeMesh(currentStroke);

scene.add(mesh);

strokes.push(mesh);

}

}

function draw(){

const pos=new THREE.Vector3();
pos.setFromMatrixPosition(controller.matrixWorld);

let width=MAX_WIDTH;

if(lastPos){

const speed=pos.distanceTo(lastPos);

width=THREE.MathUtils.clamp(
MAX_WIDTH-speed*2,
MIN_WIDTH,
MAX_WIDTH
);

}

currentStroke.push({
pos:pos.clone(),
width:width
});

lastPos=pos;

}

function createStrokeMesh(points){

const vertices=[];
const indices=[];

for(let i=1;i<points.length;i++){

const p1=points[i-1];
const p2=points[i];

const dir=new THREE.Vector3().subVectors(p2.pos,p1.pos);

const normal=new THREE.Vector3(
-dir.z,
0,
dir.x
).normalize();

const v1=p1.pos.clone().addScaledVector(normal,p1.width);
const v2=p1.pos.clone().addScaledVector(normal,-p1.width);

const v3=p2.pos.clone().addScaledVector(normal,p2.width);
const v4=p2.pos.clone().addScaledVector(normal,-p2.width);

const base=vertices.length/3;

vertices.push(v1.x,v1.y,v1.z);
vertices.push(v2.x,v2.y,v2.z);
vertices.push(v3.x,v3.y,v3.z);
vertices.push(v4.x,v4.y,v4.z);

indices.push(base,base+1,base+2);
indices.push(base+2,base+1,base+3);

}

const geometry=new THREE.BufferGeometry();

geometry.setAttribute(
"position",
new THREE.Float32BufferAttribute(vertices,3)
);

geometry.setIndex(indices);

geometry.computeVertexNormals();

const material=new THREE.MeshStandardMaterial({
color:0x111111,
roughness:1,
side:THREE.DoubleSide
});

return new THREE.Mesh(geometry,material);

}

function clearAll(){

for(const s of strokes){
scene.remove(s);
}

strokes=[];

}

function checkClear(){

const session=renderer.xr.getSession();
if(!session) return;

for(const source of session.inputSources){

if(!source.gamepad) continue;

const buttons=source.gamepad.buttons;

if(buttons.length>4){

const aButton=buttons[4];

if(aButton.pressed){

clearAll();

}

}

}

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

if(drawing){
draw();
}

checkClear();

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
