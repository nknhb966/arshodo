<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR書道</title>
<style>
body{margin:0;overflow:hidden;background:#000;}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer;
let controller;

let paper;
let drawing=false;

let prevPoint=null;
let width=0.03;

const raycaster=new THREE.Raycaster();
const tempMatrix=new THREE.Matrix4();

const stamps=[];

const texture=new THREE.TextureLoader().load("ink.png");

const brushMaterial=new THREE.MeshBasicMaterial({
 map:texture,
 transparent:true,
 depthWrite:false
});

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

if(navigator.xr){

document.body.appendChild(
ARButton.createButton(renderer,{
 requiredFeatures:["local-floor"]
})
);

}

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

createPaper();
createBrush();

controller=renderer.xr.getController(0);

controller.addEventListener("selectstart",()=>{
 drawing=true;
 prevPoint=null;
});

controller.addEventListener("selectend",()=>{
 drawing=false;
});

scene.add(controller);

window.addEventListener("resize",resize);

}

function createPaper(){

const geo=new THREE.PlaneGeometry(1.4,0.9);

const mat=new THREE.MeshBasicMaterial({
 color:0xffffff,
 transparent:true,
 opacity:0.6,
 side:THREE.DoubleSide
});

paper=new THREE.Mesh(geo,mat);
paper.position.set(0,0.3,-1.0);
paper.rotation.x = -0.15;
scene.add(paper);

}

function createBrush(){

const stick=new THREE.Mesh(
 new THREE.CylinderGeometry(0.005,0.005,0.25),
 new THREE.MeshStandardMaterial({color:0x884400})
);

stick.position.y=-0.12;

const tip=new THREE.Mesh(
 new THREE.ConeGeometry(0.015,0.05),
 new THREE.MeshStandardMaterial({color:0x111111})
);

tip.position.y=-0.28;

const brush=new THREE.Group();
brush.add(stick);
brush.add(tip);

controller=renderer.xr.getController(0);
controller.add(brush);

}

function getDrawPoint(){

tempMatrix.identity().extractRotation(controller.matrixWorld);

raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);

raycaster.ray.direction
.set(0,0,-1)
.applyMatrix4(tempMatrix);

const hit=raycaster.intersectObject(paper);

if(hit.length>0){

return hit[0].point;

}

return null;

}

function updateBrush(){

const point=getDrawPoint();

if(!point) return;

if(!prevPoint){

prevPoint=point;
return;

}

const speed=point.distanceTo(prevPoint);

const targetWidth=THREE.MathUtils.clamp(
0.04/(speed+0.001),
0.01,
0.06
);

width=THREE.MathUtils.lerp(width,targetWidth,0.3);

const dist=point.distanceTo(prevPoint);

const steps=Math.floor(dist/0.01);

for(let i=0;i<steps;i++){

const p=prevPoint.clone().lerp(point,i/steps);

stamp(p,width);

}

prevPoint=point;

}

function stamp(pos,size){

const geo = new THREE.PlaneGeometry(size,size);

const mesh = new THREE.Mesh(geo,brushMaterial);

mesh.position.copy(pos);

mesh.quaternion.copy(paper.quaternion);

scene.add(mesh);

stamps.push(mesh);

}

function clearAll(){

for(const s of stamps){

scene.remove(s);

}

stamps.length=0;

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

if(drawing){

updateBrush();

}

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

}

window.addEventListener("keydown",e=>{

if(e.key==="c") clearAll();

});

</script>

</body>
</html>
