<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR空中書道 展示版</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer,controller;
let drawing=false;

let tip;
let gamepad=null;

const MAX_POINTS=5000;

let positions=[];
let sizes=[];
let geometry;
let material;
let line;

const pos=new THREE.Vector3();
const lastPos=new THREE.Vector3();

let hasLast=false;

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.xr.enabled=true;

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["local-floor"]
})
);

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

controller=renderer.xr.getController(0);
scene.add(controller);

renderer.xr.addEventListener("sessionstart",setupGamepad);

createBrush();
createInk();

window.addEventListener("resize",resize);

}

function setupGamepad(){

const session=renderer.xr.getSession();

for(const source of session.inputSources){

if(source.gamepad){

gamepad=source.gamepad;

}

}

}

function createBrush(){

const brush=new THREE.Group();

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.012,0.012,0.25,6),
new THREE.MeshStandardMaterial({color:0x884400})
);

tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05,6),
new THREE.MeshStandardMaterial({color:0x111111})
);

stick.rotation.x=Math.PI/2;
tip.rotation.x=-Math.PI/2;

stick.position.z=0.15;

brush.add(stick);
brush.add(tip);

brush.rotation.z=Math.PI/2;
brush.rotation.x=-Math.PI/3;

controller.add(brush);

}

function createInk(){

geometry=new THREE.BufferGeometry();

const posArray=new Float32Array(MAX_POINTS*3);

geometry.setAttribute(
"position",
new THREE.BufferAttribute(posArray,3)
);

material=new THREE.LineBasicMaterial({
color:0x000000,
transparent:true,
opacity:0.9
});

line=new THREE.Line(geometry,material);

scene.add(line);

}

function getTrigger(){

if(!gamepad) return 0;

return gamepad.buttons[0].value;

}

function getTipPosition(){

const v=new THREE.Vector3();

tip.getWorldPosition(v);

return v;

}

function addPoint(p,size){

if(positions.length>=MAX_POINTS){

positions.shift();

}

positions.push(p.clone());

updateGeometry();

}

function updateGeometry(){

const arr=geometry.attributes.position.array;

for(let i=0;i<positions.length;i++){

arr[i*3]=positions[i].x;
arr[i*3+1]=positions[i].y;
arr[i*3+2]=positions[i].z;

}

geometry.setDrawRange(0,positions.length);

geometry.attributes.position.needsUpdate=true;

}

function draw(){

pos.copy(getTipPosition());

if(hasLast){

const dist=pos.distanceTo(lastPos);

const trigger=getTrigger();

let size=THREE.MathUtils.lerp(
0.002,
0.03,
trigger
);

size*=THREE.MathUtils.clamp(
1.2-dist*20,
0.3,
1.2
);

addPoint(pos,size);

}

lastPos.copy(pos);
hasLast=true;

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

const trigger=getTrigger();

if(trigger>0.05){

if(!drawing){

drawing=true;
hasLast=false;

}

draw();

}else{

drawing=false;

}

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}

</script>

</body>
</html>
