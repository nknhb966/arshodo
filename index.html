<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR空中書道</title>

<style>
body{
margin:0;
overflow:hidden;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer;
let controller;

let drawing=false;

let strokes=[];

let strokeGeometry;
let strokeMesh;

let vertices=[];
let indices=[];

let lastPos=null;

init();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["local-floor"]
})
);

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

controller=renderer.xr.getController(0);
scene.add(controller);

createBrush();

controller.addEventListener("selectstart",startDraw);
controller.addEventListener("selectend",endDraw);

window.addEventListener("resize",resize);

renderer.setAnimationLoop(render);

}

function createBrush(){

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.005,0.005,0.25),
new THREE.MeshStandardMaterial({color:0x884400})
);

stick.position.y=-0.12;

const tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05),
new THREE.MeshStandardMaterial({color:0x111111})
);

tip.position.y=-0.28;

const brush=new THREE.Group();
brush.add(stick);
brush.add(tip);

controller.add(brush);

}

function startDraw(){

drawing=true;

vertices=[];
indices=[];
lastPos=null;

strokeGeometry=new THREE.BufferGeometry();

const material=new THREE.MeshStandardMaterial({
color:0x111111,
side:THREE.DoubleSide,
roughness:1
});

strokeMesh=new THREE.Mesh(strokeGeometry,material);

scene.add(strokeMesh);

strokes.push(strokeMesh);

}

function endDraw(){

drawing=false;
lastPos=null;

}

function draw(){

const pos=new THREE.Vector3();
pos.setFromMatrixPosition(controller.matrixWorld);

if(lastPos===null){

lastPos=pos;
return;

}

const dist=pos.distanceTo(lastPos);

if(dist<0.004) return;

const speed=dist;

const width=THREE.MathUtils.clamp(
0.04-speed*2,
0.005,
0.04
);

const dir=new THREE.Vector3().subVectors(pos,lastPos).normalize();

const camDir=new THREE.Vector3();
camera.getWorldDirection(camDir);

const side=new THREE.Vector3()
.crossVectors(dir,camDir)
.normalize()
.multiplyScalar(width);

const v1=pos.clone().add(side);
const v2=pos.clone().sub(side);

const base=vertices.length/3;

vertices.push(v1.x,v1.y,v1.z);
vertices.push(v2.x,v2.y,v2.z);

if(base>=2){

indices.push(base-2,base-1,base);
indices.push(base,base-1,base+1);

}

strokeGeometry.setAttribute(
"position",
new THREE.BufferAttribute(new Float32Array(vertices),3)
);

strokeGeometry.setIndex(indices);

strokeGeometry.attributes.position.needsUpdate=true;

strokeGeometry.computeVertexNormals();
strokeGeometry.computeBoundingSphere();

lastPos=pos;

}

function clearAll(){

strokes.forEach(m=>{
scene.remove(m);
});

strokes=[];

}

function checkButtons(){

const session=renderer.xr.getSession();

if(!session) return;

for(const source of session.inputSources){

if(!source.gamepad) continue;

const gp=source.gamepad;

if(gp.buttons[4] && gp.buttons[4].pressed){

clearAll();

}

}

}

function render(){

checkButtons();

if(drawing){
draw();
}

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
