```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR書道（安定版）</title>
<style>
body{margin:0;overflow:hidden;}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer;
let controller;

let paper;

let drawing=false;
let prevUV=null;

let canvas,ctx,texture;
let brushImg=new Image();
brushImg.src="ink.png";

const raycaster=new THREE.Raycaster();
const tempMatrix=new THREE.Matrix4();

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

if(navigator.xr){
document.body.appendChild(
ARButton.createButton(renderer,{requiredFeatures:["local-floor"]})
);
}

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

createCanvas();
createPaper();
createBrush();

controller=renderer.xr.getController(0);

controller.addEventListener("selectstart",()=>{
drawing=true;
prevUV=null;
});

controller.addEventListener("selectend",()=>{
drawing=false;
});

scene.add(controller);

window.addEventListener("resize",resize);

}

function createCanvas(){

canvas=document.createElement("canvas");
canvas.width=1024;
canvas.height=1024;

ctx=canvas.getContext("2d");

ctx.fillStyle="#ffffff";
ctx.fillRect(0,0,canvas.width,canvas.height);

texture=new THREE.CanvasTexture(canvas);

}

function createPaper(){

const geo=new THREE.PlaneGeometry(1.4,0.9);

const mat=new THREE.MeshBasicMaterial({
map:texture,
side:THREE.FrontSide
});

paper=new THREE.Mesh(geo,mat);

paper.position.set(0,1.1,-1.0);

scene.add(paper);

}

function createBrush(){

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.005,0.005,0.25),
new THREE.MeshStandardMaterial({color:0x884400})
);

stick.position.y=-0.12;

const tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05),
new THREE.MeshStandardMaterial({color:0x111111})
);

tip.position.y=-0.28;

const brush=new THREE.Group();
brush.add(stick);
brush.add(tip);

controller=renderer.xr.getController(0);
controller.add(brush);

}

function getUV(){

tempMatrix.identity().extractRotation(controller.matrixWorld);

raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);

raycaster.ray.direction
.set(0,0,-1)
.applyMatrix4(tempMatrix);

const hit=raycaster.intersectObject(paper);

if(hit.length>0){

return hit[0].uv;

}

return null;

}

function draw(){

const uv=getUV();

if(!uv) return;

const x=uv.x*canvas.width;
const y=(1-uv.y)*canvas.height;

const size=40;

if(prevUV){

const px=prevUV.x*canvas.width;
const py=(1-prevUV.y)*canvas.height;

const dist=Math.hypot(x-px,y-py);

const steps=Math.floor(dist/5);

for(let i=0;i<steps;i++){

const t=i/steps;

const dx=px+(x-px)*t;
const dy=py+(y-py)*t;

ctx.drawImage(brushImg,dx-size/2,dy-size/2,size,size);

}

}else{

ctx.drawImage(brushImg,x-size/2,y-size/2,size,size);

}

texture.needsUpdate=true;

prevUV=uv;

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

if(drawing){
draw();
}

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
