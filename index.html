<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR書道 Ultimate</title>
<style>
body{margin:0;overflow:hidden;}
</style>
</head>

<body>
<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer;
let controller0,controller1,rightController=null;
let gamepad=null;

let drawing=false;

const STEP_DISTANCE=0.004;
const MIN_SIZE=0.001;
const MAX_SIZE=0.035;

const MAX_STAMPS=6000;

let instancedMesh;
let stampIndex=0;

let brushColor=new THREE.Color(0x111111);

const dummy=new THREE.Object3D();
const pos=new THREE.Vector3();
const lastPos=new THREE.Vector3();
const interp=new THREE.Vector3();

let hasLast=false;
let lastSize=0.01;

// 抜き
let fadeOutCount=0;
const FADE_STEPS=8;

// 色用
const colorArray=new Float32Array(MAX_STAMPS*3);

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.01,20);

renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:["local-floor"]}));

scene.add(new THREE.HemisphereLight(0xffffff,0xbbbbff,1));

controller0=renderer.xr.getController(0);
controller1=renderer.xr.getController(1);

scene.add(controller0);
scene.add(controller1);

controller0.addEventListener("connected",onConnected);
controller1.addEventListener("connected",onConnected);

createInkSystem();

window.addEventListener("resize",resize);

}

function onConnected(e){

if(e.data.handedness==="right"){
rightController=e.target;
gamepad=e.data.gamepad;

controller0.visible=(rightController===controller0);
controller1.visible=(rightController===controller1);

attachBrush();
}

}

function attachBrush(){

controller0.clear();
controller1.clear();

const brush=new THREE.Group();

const stick=new THREE.Mesh(
new THREE.CylinderGeometry(0.01,0.01,0.25,6),
new THREE.MeshStandardMaterial({color:0x884400})
);

const tip=new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05,6),
new THREE.MeshStandardMaterial({color:0x111111})
);

stick.rotation.x=Math.PI/2;
tip.rotation.x=-Math.PI/2;

stick.position.z=0.15;

brush.add(stick);
brush.add(tip);

brush.rotation.set(-Math.PI/3,0,Math.PI/2);

rightController.add(brush);

}

function createInkSystem(){

const geo=new THREE.SphereGeometry(1,6,6);

const mat=new THREE.MeshStandardMaterial({
vertexColors:true,
roughness:1
});

instancedMesh=new THREE.InstancedMesh(geo,mat,MAX_STAMPS);

instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
instancedMesh.frustumCulled=false;

// ★ 色バッファ
instancedMesh.instanceColor=new THREE.InstancedBufferAttribute(colorArray,3);

scene.add(instancedMesh);

// 初期化
dummy.scale.set(0,0,0);
dummy.updateMatrix();
instancedMesh.setMatrixAt(0,dummy.matrix);
instancedMesh.count=1;

}

function getTrigger(){
if(!gamepad) return 0;
return gamepad.buttons[0].value;
}

function updateColor(){

if(!gamepad) return;

const x=gamepad.axes[2];
const y=gamepad.axes[3];

if(Math.abs(x)<0.2 && Math.abs(y)<0.2) return;

const angle=Math.atan2(y,x);
const hue=(angle+Math.PI)/(Math.PI*2);

brushColor.setHSL(hue,1,0.5);

}

function draw(){

pos.setFromMatrixPosition(rightController.matrixWorld);

if(hasLast){

const dist=pos.distanceTo(lastPos);
const steps=Math.max(2,Math.floor(dist/STEP_DISTANCE));

for(let i=1;i<=steps;i++){

const t=i/steps;
interp.lerpVectors(lastPos,pos,t);

const pressure=getTrigger();

// 速度
const speed=dist;

// 速度で細く
const speedFactor=THREE.MathUtils.clamp(1.0-speed*20.0,0.2,1.0);

let targetSize=MAX_SIZE*pressure*speedFactor;
targetSize=Math.max(targetSize,MIN_SIZE);

// スムーズ
const size=THREE.MathUtils.lerp(lastSize,targetSize,0.25);
lastSize=size;

stamp(interp,size);

}

}

lastPos.copy(pos);
hasLast=true;

}

function stamp(position,size){

if(stampIndex>=MAX_STAMPS) return;

dummy.position.copy(position);
dummy.scale.set(size,size*0.6,size);
dummy.updateMatrix();

instancedMesh.setMatrixAt(stampIndex,dummy.matrix);

// ★ 色セット
colorArray[stampIndex*3+0]=brushColor.r;
colorArray[stampIndex*3+1]=brushColor.g;
colorArray[stampIndex*3+2]=brushColor.b;

stampIndex++;

}

function fadeOut(){

if(fadeOutCount<=0) return;

const size=lastSize*(fadeOutCount/FADE_STEPS);
stamp(pos,size);

fadeOutCount--;

}

function clearAll(){

stampIndex=0;
instancedMesh.count=0;

hasLast=false;

}

function checkButtons(){

if(!gamepad) return;

// A：リセット
if(gamepad.buttons[4]?.pressed){
clearAll();
}

// B：黒
if(gamepad.buttons[5]?.pressed){
brushColor.set(0x111111);
}

}

function animate(){
renderer.setAnimationLoop(render);
}

function render(){

updateColor();

if(!rightController){
renderer.render(scene,camera);
return;
}

const t=getTrigger();

if(t>0.05){

if(!drawing){
hasLast=false;
drawing=true;
}

draw();
fadeOutCount=FADE_STEPS;

}else{

if(drawing){
drawing=false;
fadeOut();
}else{
fadeOut();
}

}

checkButtons();

// ★ 毎フレ更新（重要）
instancedMesh.count=stampIndex;
instancedMesh.instanceMatrix.needsUpdate=true;
instancedMesh.instanceColor.needsUpdate=true;

renderer.render(scene,camera);

}

function resize(){
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
}

</script>
</body>
</html>
