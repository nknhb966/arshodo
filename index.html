<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR書道</title>
<style>body{margin:0;overflow:hidden;}</style>
</head>
<body>
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene, camera, renderer;
let controller0, controller1, rightController = null;
let gamepad = null;

const STEP_DISTANCE = 0.005;
const MIN_SIZE = 0.001;
const MAX_SIZE = 0.03;
const MAX_STAMPS = 8000;

let instancedMesh;
let stampIndex = 0;

const dummy = new THREE.Object3D();
const pos = new THREE.Vector3();
const lastPos = new THREE.Vector3();
const interp = new THREE.Vector3();
let hasLast = false;
let lastSize = 0.01;

let textGroup = new THREE.Group(); // 文字全体グループ
let drawing = false;

let pivotComputed = false;
let rotationActive = false;
const targetPosition = new THREE.Vector3();
const targetRotation = new THREE.Euler();
let prevControllerPos = new THREE.Vector3();

const panSensitivity = 1.0;
const rotSensitivity = 2.0;
const smoothFactor = 0.2; // スムージング係数（0.0〜1.0）

init();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
    renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(ARButton.createButton(renderer, {requiredFeatures:["local-floor"]}));

    scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

    controller0 = renderer.xr.getController(0);
    controller1 = renderer.xr.getController(1);
    scene.add(controller0);
    scene.add(controller1);
    controller0.addEventListener("connected", onConnected);
    controller1.addEventListener("connected", onConnected);

    createInkSystem();
    scene.add(textGroup);

    window.addEventListener("resize", resize);
}

function onConnected(event){
    const data = event.data;
    if(data.handedness === "right"){
        rightController = event.target;
        attachBrush();
    }
}

function attachBrush(){
    if(!rightController) return;
    controller0.clear();
    controller1.clear();

    const brush = new THREE.Group();
    const stick = new THREE.Mesh(
        new THREE.CylinderGeometry(0.012, 0.012, 0.25, 6),
        new THREE.MeshStandardMaterial({color:0x884400})
    );
    const tip = new THREE.Mesh(
        new THREE.ConeGeometry(0.015, 0.05, 6),
        new THREE.MeshStandardMaterial({color:0x111111})
    );
    stick.rotation.x = Math.PI/2;
    tip.rotation.x = -Math.PI/2;
    stick.position.z = 0.15;
    brush.add(stick);
    brush.add(tip);
    brush.rotation.set(-Math.PI/3, 0, Math.PI/2);
    rightController.add(brush);
}

function createInkSystem(){
    const geo = new THREE.SphereGeometry(1,10,10);
    const mat = new THREE.MeshStandardMaterial({color:0x111111});
    instancedMesh = new THREE.InstancedMesh(geo, mat, MAX_STAMPS);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    instancedMesh.frustumCulled = false;
    textGroup.add(instancedMesh);
    instancedMesh.count = 0;
}

function updateGamepad(){
    const session = renderer.xr.getSession();
    if(!session) return;
    for(const source of session.inputSources){
        if(source.handedness === "right" && source.gamepad){
            gamepad = source.gamepad;
            return;
        }
    }
}

function getTriggerValue(index){ return gamepad ? gamepad.buttons[index]?.value||0 : 0; }

function draw(){
    if(!rightController) return;
    const trigger = getTriggerValue(0); // 人差し指
    if(trigger < 0.05) return;

    pos.setFromMatrixPosition(rightController.matrixWorld);
    if(hasLast){
        const dist = pos.distanceTo(lastPos);
        const steps = Math.max(1, Math.floor(dist / STEP_DISTANCE));
        for(let i=1; i<=steps; i++){
            const t = i/steps;
            interp.lerpVectors(lastPos, pos, t);
            stamp(interp, lastSize);
        }
    }
    lastPos.copy(pos);
    hasLast = true;
}

function stamp(position, size){
    const index = stampIndex % MAX_STAMPS; // 循環バッファ
    dummy.position.copy(position);
    dummy.scale.set(size,size,size);
    dummy.updateMatrix();
    instancedMesh.setMatrixAt(index, dummy.matrix);

    stampIndex++;
    instancedMesh.count = Math.min(stampIndex, MAX_STAMPS); // 常に MAX_STAMPS 個表示
    instancedMesh.instanceMatrix.needsUpdate = true;
}

function computePivot(){
    if(stampIndex === 0) return;
    let min = new THREE.Vector3(Infinity, Infinity, Infinity);
    let max = new THREE.Vector3(-Infinity, -Infinity, -Infinity);
    for(let i=0; i<Math.min(stampIndex, MAX_STAMPS); i++){
        instancedMesh.getMatrixAt(i, dummy.matrix);
        dummy.position.setFromMatrixPosition(dummy.matrix);
        min.min(dummy.position);
        max.max(dummy.position);
    }
    const center = min.clone().add(max).multiplyScalar(0.5);
    targetPosition.set(-center.x, -center.y, -center.z);
    pivotComputed = true;
}

function handleRotationAndPan(){
    if(!rightController || !pivotComputed) return;
    const midTrigger = getTriggerValue(1); // 中指
    if(midTrigger < 0.05){ rotationActive = false; return; }

    const currentPos = new THREE.Vector3().setFromMatrixPosition(rightController.matrixWorld);
    if(!rotationActive){
        prevControllerPos.copy(currentPos);
        rotationActive = true;
        return;
    }

    const delta = currentPos.clone().sub(prevControllerPos);

    // 半押し:平行移動, 全押し:回転
    if(midTrigger < 0.9){
        targetPosition.add(delta.clone().multiplyScalar(panSensitivity));
    } else {
        targetRotation.y += delta.x * rotSensitivity;
        targetRotation.x += delta.y * rotSensitivity;
    }

    prevControllerPos.copy(currentPos);

    // スムージング適用
    textGroup.position.lerp(targetPosition, smoothFactor);
    textGroup.rotation.x = THREE.MathUtils.lerp(textGroup.rotation.x, targetRotation.x, smoothFactor);
    textGroup.rotation.y = THREE.MathUtils.lerp(textGroup.rotation.y, targetRotation.y, smoothFactor);
    textGroup.rotation.z = THREE.MathUtils.lerp(textGroup.rotation.z, targetRotation.z, smoothFactor);
}

function animate(){ renderer.setAnimationLoop(render); }

function render(){
    updateGamepad();
    if(!rightController){ renderer.render(scene,camera); return; }

    const trigger = getTriggerValue(0); // 人差し指
    if(trigger > 0.05){
        drawing = true;
        draw();
        pivotComputed = false; // 描画中は重心計算無効
    } else {
        if(drawing){
            drawing = false;
            computePivot(); // 描画終了時に重心を計算
        }
        handleRotationAndPan(); // 描画後のみスムーズに回転・移動
    }

    renderer.render(scene,camera);
}

function resize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
