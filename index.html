<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>AR空中書道</title>

<style>
body{
margin:0;
overflow:hidden;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene,camera,renderer;

let controllerR,controllerL;
let activeController=null;
let activeGamepad=null;

let drawing=false;

const STEP_DISTANCE=0.006;

const MIN_SIZE=0.001;
const MAX_SIZE=0.035;

const MAX_STAMPS=15000;

let instancedMesh;
let stampIndex=0;

let inkUpdated=false;

const dummy=new THREE.Object3D();
const pos=new THREE.Vector3();
const lastPos=new THREE.Vector3();
const interp=new THREE.Vector3();

let hasLast=false;

let brush;

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);

if(navigator.xr){

document.body.appendChild(
ARButton.createButton(renderer,{
requiredFeatures:["local-floor"]
})
);

}

const light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

controllerR = renderer.xr.getController(0);
controllerL = renderer.xr.getController(1);

scene.add(controllerR);
scene.add(controllerL);

createBrush();
createInkSystem();

window.addEventListener("resize",resize);

}

function createBrush(){

brush = new THREE.Group();

const stick = new THREE.Mesh(
new THREE.CylinderGeometry(0.012,0.012,0.25,6),
new THREE.MeshStandardMaterial({color:0x884400})
);

const tip = new THREE.Mesh(
new THREE.ConeGeometry(0.015,0.05,6),
new THREE.MeshStandardMaterial({color:0x111111})
);

stick.rotation.x=Math.PI/2;
tip.rotation.x=-Math.PI/2;

tip.position.z=0;
stick.position.z=0.15;

brush.rotation.z=Math.PI/2;
brush.rotation.x=-Math.PI/3;

brush.add(stick);
brush.add(tip);

}

function selectController(){

const session = renderer.xr.getSession();
if(!session) return;

let right=null;
let left=null;
let any=null;

for(const source of session.inputSources){

if(!source.gamepad) continue;

if(source.handedness==="right") right=source;
else if(source.handedness==="left") left=source;
else any=source;

}

let selected = right || left || any;

if(!selected) return;

activeGamepad = selected.gamepad;

if(activeController){
activeController.remove(brush);
}

if(selected.handedness==="right"){

activeController = controllerR;

}else{

activeController = controllerL;

}

activeController.add(brush);

}

function createInkSystem(){

const geo=new THREE.SphereGeometry(1,10,10);

const mat=new THREE.MeshStandardMaterial({
color:0x111111,
roughness:1
});

instancedMesh=new THREE.InstancedMesh(
geo,
mat,
MAX_STAMPS
);

instancedMesh.count=0;

scene.add(instancedMesh);

}

function getTriggerValue(){

if(!activeGamepad) return 0;

for(const b of activeGamepad.buttons){

if(b.pressed) return 1;

}

return 0;

}

function draw(){

if(!activeController) return;

activeController.updateMatrixWorld(true);

pos.setFromMatrixPosition(activeController.matrixWorld);

if(hasLast){

const dist=pos.distanceTo(lastPos);

const steps=Math.max(1,Math.floor(dist/STEP_DISTANCE));

for(let i=1;i<=steps;i++){

const t=i/steps;

interp.lerpVectors(lastPos,pos,t);

const trigger=getTriggerValue();

let pressureSize=THREE.MathUtils.lerp(MIN_SIZE,MAX_SIZE,trigger);

let speedSize=THREE.MathUtils.clamp(
MAX_SIZE-dist*2,
MIN_SIZE,
MAX_SIZE
);

let size=(pressureSize+speedSize)*0.5;

stamp(interp,size);

}

}

lastPos.copy(pos);
hasLast=true;

}

function stamp(position,size){

dummy.position.copy(position);
dummy.scale.set(size,size,size);

dummy.updateMatrix();

instancedMesh.setMatrixAt(stampIndex,dummy.matrix);

stampIndex++;

if(stampIndex>=MAX_STAMPS){
stampIndex=0;
}

inkUpdated=true;

}

function clearAll(){

stampIndex=0;

instancedMesh.count=0;

instancedMesh.instanceMatrix.needsUpdate=true;

}

function checkClear(){

if(!activeGamepad) return;

if(activeGamepad.buttons.length>4){

if(activeGamepad.buttons[4].pressed){

clearAll();

}

}

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(){

selectController();

const trigger=getTriggerValue();

if(trigger>0.05){

if(!drawing){
hasLast=false;
drawing=true;
}

draw();

}else{

drawing=false;

}

if(inkUpdated){

instancedMesh.count=MAX_STAMPS;

instancedMesh.instanceMatrix.needsUpdate=true;

inkUpdated=false;

}

checkClear();

renderer.render(scene,camera);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

}

</script>

</body>
</html>
